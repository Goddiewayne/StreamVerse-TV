name: Build Hosted Index

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r tools/hosted-index-builder/requirements.txt

      - name: Build hosted index
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python tools/hosted-index-builder/build_index.py \
            --output-dir ./dist

      - name: Deploy to streamverse-data
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.STREAMVERSE_DEPLOY_KEY }}
          external_repository: Goddiewayne/streamverse-data
          publish_branch: main
          publish_dir: ./dist
          enable_jekyll: false
