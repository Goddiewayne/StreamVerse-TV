name: StreamVerse Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'backend/pipeline/**'
      - '.github/workflows/merge-channels.yml'

env:
  DATA_BASE_URL: https://Goddiewayne.github.io/streamverse-data
  DATA_REPO_REMOTE: https://github.com/Goddiewayne/streamverse-data.git
  DATA_REPO_BRANCH: gh-pages
  MAX_CONCURRENT_PROBES: 50

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run pipeline
        working-directory: backend/pipeline
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: chmod +x gradlew && ./gradlew run -q
