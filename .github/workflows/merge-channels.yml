name: Merge Channels

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'build-tools/merge-pipeline/**'
      - '.github/workflows/merge-channels.yml'

env:
  DATA_BASE_URL: https://Goddiewayne.github.io/streamverse-data

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: pipeline

      - uses: actions/checkout@v4
        with:
          repository: Goddiewayne/streamverse-data
          token: ${{ secrets.GH_PAT }}
          path: data
          ref: gh-pages

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build merge pipeline
        working-directory: pipeline/build-tools/merge-pipeline
        run: gradle build

      - name: Run merge pipeline
        working-directory: pipeline/build-tools/merge-pipeline
        run: gradle run -q --args="${{ github.workspace }}/data"

      - name: Commit merged.json to streamverse-data
        working-directory: data
        run: |
          git config user.name "Merge Bot"
          git config user.email "bot@streamverse.tv"
          git add merged.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-merge channels ($(date -u +%Y-%m-%d)) [skip ci]"
            git push
          fi
